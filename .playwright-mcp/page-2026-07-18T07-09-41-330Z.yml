            - paragraph [ref=f3e177]: "स्व:घोषणा: म/हामीले लगानी गरेको रकम कुनै पनि प्रचलित ऐन वा कानुनको बर्खिलाप हुने गरि आर्जन नगरेको, म/हामी कालो सूचीमा नपरेको र सो शेयर खरिद गर्न योग्य रहेको घोषणा गर्दछु/गर्दछौँ । साथै, धितोपत्रमा गरिने लगानीमा जोखिमपूर्ण हुन सक्ने भएकोले यस्तो जोखिम म/हामी स्वयंले लिने गरी यो मन्जुरी गरेको घोषणा गर्दछु/गर्दछौँ ।"
            - list [ref=f3e178]:
              - listitem [ref=f3e179]: "- व्यक्तिको हकमा: नागरीकता, राष्ट्रिय परिचयपत्र, PAN र १ प्रति फोटो अनिवार्य संलग्न हुनुपर्नेछ । साथै, उल्लेखित विवरणहरू अनिवार्य भर्नुपर्नेछ ।"
              - listitem [ref=f3e180]: "- कम्पनीको हकमा: कम्पनी दर्ता प्रमाणपत्र, प्यान, शेयरमा लगानी गर्ने सम्बन्धी सञ्चालक समितिको निर्णय/अख्तियारनामा र कम्पनीको प्रवन्धपत्र तथा नियमावलीको प्रतिलिपि।"
            - paragraph [ref=f3e181]: मैले/हामीले यस दरखास्त फारम राम्ररी पढी जानी बुझी यसै साथ संलग्न गरेका कागजातहरू स्वयंले प्रमाणीत गरी फारममा खुलाएको विवरण साँचो हो । साथै, शेयर खरिद तथा बाँडफाँड सम्बन्धमा सञ्चालक समितिको निर्णय अनुसार हुने मन्जुर गर्दछु/गर्दछौँ । सो विवरण गलत ठहरिएमा प्रचलित नेपालको कानून बमोजिम पालन गर्न मेरो/हाम्रो मन्जुरी छ ।
